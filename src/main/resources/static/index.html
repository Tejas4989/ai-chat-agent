<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PolicyCover AI — Spring AI Day 3</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: #f5f5f0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        .card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.08);
            padding: 2rem;
            width: 100%;
            max-width: 700px;
        }
        h1 { font-size: 1.2rem; font-weight: 600; margin-bottom: 1.5rem; color: #111; }
        label { font-size: 13px; font-weight: 500; color: #555; display: block; margin-bottom: 4px; }
        input, select {
            width: 100%; padding: 8px 12px;
            border: 1px solid #ddd; border-radius: 8px;
            font-size: 14px; margin-bottom: 14px;
            font-family: inherit;
        }
        button {
            background: #185FA5; color: white;
            border: none; border-radius: 8px;
            padding: 10px 20px; font-size: 14px;
            font-weight: 500; cursor: pointer; width: 100%;
        }
        button:disabled { background: #999; cursor: not-allowed; }
        .response-box {
            margin-top: 1.5rem;
            background: #f9f9f7;
            border: 1px solid #e8e8e4;
            border-radius: 8px;
            padding: 1rem 1.2rem;
            min-height: 80px;
            font-size: 14px;
            line-height: 1.7;
            color: #222;
            white-space: pre-wrap;
        }
        .status {
            font-size: 12px; color: #888;
            margin-top: 8px; text-align: right;
        }
        .cursor {
            display: inline-block;
            width: 2px; height: 16px;
            background: #185FA5;
            animation: blink 0.8s step-end infinite;
            vertical-align: text-bottom;
            margin-left: 2px;
        }
        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body>
<div class="card">
    <h1>PolicyCover AI — Insurance Explainer</h1>

    <label for="topic">Insurance Topic</label>
    <input id="topic" type="text"
           placeholder="e.g. commercial general liability insurance"
           value="commercial general liability insurance" />

    <label for="tone">Tone</label>
    <select id="tone">
        <option value="friendly">Friendly</option>
        <option value="professional">Professional</option>
        <option value="technical">Technical</option>
    </select>

    <label for="audience">Audience</label>
    <input id="audience" type="text"
           placeholder="e.g. first-time buyer, business owner"
           value="first-time buyer" />

    <button id="btn" onclick="runStream()">Generate Explanation</button>

    <div class="response-box" id="output">
        Your explanation will appear here, word by word...
    </div>
    <div class="status" id="status"></div>
</div>

<script>
    async function runStream() {
        const topic    = document.getElementById('topic').value.trim();
        const tone     = document.getElementById('tone').value;
        const audience = document.getElementById('audience').value.trim();
        const output   = document.getElementById('output');
        const btn      = document.getElementById('btn');
        const status   = document.getElementById('status');

        if (!topic || !audience) {
            output.textContent = 'Please fill in all fields.';
            return;
        }

        // Reset UI
        output.innerHTML = '<span class="cursor"></span>';
        btn.disabled = true;
        btn.textContent = 'Generating...';
        status.textContent = '';

        const startTime = Date.now();
        let tokenCount = 0;

        try {
            // fetch() with a streaming body — works in all modern browsers
            const response = await fetch('/explain/stream', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ topic, tone, audience })
            });

            if (!response.ok) {
                output.textContent = `Error: ${response.status} ${response.statusText}`;
                return;
            }

            // ReadableStream — read chunks as they arrive
            const reader = response.body.getReader();
            const decoder = new TextDecoder();
            let buffer = '';
            let fullText = '';

            while (true) {
                const { done, value } = await reader.read();
                if (done) break;

                // Decode the byte chunk and add to buffer
                buffer += decoder.decode(value, { stream: true });

                // SSE lines look like: "data: some text\n\n"
                // Split on double newline to get complete events
                const events = buffer.split('\n\n');
                // Last item may be incomplete — keep it in the buffer
                buffer = events.pop();

                for (const event of events) {
                    if (!event.startsWith('data:')) continue;
                    // Strip the "data: " prefix
                    const text = event.replace(/^data:\s?/, '');
                    if (text === '[DONE]') continue;

                    fullText += text;
                    tokenCount++;

                    // Update the DOM — cursor stays at end
                    output.innerHTML =
                        fullText.replace(/\n/g, '<br>') +
                        '<span class="cursor"></span>';
                }
            }

            // Stream complete — remove cursor, show stats
            output.innerHTML = fullText.replace(/\n/g, '<br>');
            const elapsed = ((Date.now() - startTime) / 1000).toFixed(1);
            status.textContent = `Done in ${elapsed}s · ~${tokenCount} chunks received`;

        } catch (err) {
            output.textContent = `Connection error: ${err.message}`;
        } finally {
            btn.disabled = false;
            btn.textContent = 'Generate Explanation';
        }
    }

    // Allow Enter key on inputs
    document.addEventListener('keydown', e => {
        if (e.key === 'Enter') runStream();
    });
</script>
</body>
</html>
